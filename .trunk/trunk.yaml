# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
#
# Decision (see .pre-commit-config.yaml): Python lint + format is owned by pre-commit's Ruff.
# Trunk therefore no longer runs black / isort / ruff (they duplicated and fought the pre-commit
# hooks). Trunk keeps the security scanners and the non-Python file linters only.
version: 0.1
cli:
  version: 1.19.0
plugins:
  sources:
    - id: trunk
      ref: v1.4.2
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - node@18.12.1
    # Reconciled with pyproject `requires-python` and CI to a single Python version (3.12).
    - python@3.12.2
lint:
  enabled:
    - bandit@1.7.7
    - checkov@3.2.5
    - git-diff-check
    - markdownlint@0.39.0
    - osv-scanner@1.6.2
    - oxipng@9.0.0
    - prettier@3.2.5
    - taplo@0.8.1
    - trivy@0.49.1
    - trufflehog@3.67.4
    - yamllint@1.34.0
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
